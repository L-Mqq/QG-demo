<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 教学管理系统</title>
  <link rel="stylesheet" href="./login.css">
</head>

<body>
  <div class="login-container">
    <div class="login-form">
      <h2>教学管理系统</h2>
      <h3>用户登录</h3>
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="off">
      </div>
      <div id="currentMsg" class="current-message"></div>
      <!-- 点击登录时执行函数 -->
      <button type="button" onclick="login()" class="login-btn">登录</button>
    </div>
  </div>
  <script src="./login.js"></script>
</body>

</html>
