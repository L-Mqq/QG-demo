          <button id="addCraftBtn" data-parent="1">新增工艺</button>

      <div class="center-content">

        </ul>
      </div>
      <div class="center-bottom-delBtn">
        <button id="center-del-Craft-Btn" data-parent="1" data-num="1">删除当前工艺</button>
      </div>
    </div>



    <div class="right">
      <div class="right-header">
        <div class="right-header-title">
          <p>工艺：新工艺1</p>

        <div class="right-header-btn">
          <div class="delete-btn">
            <button id="clear-Step-Btn" data-num="1" data-parent="1">清空工序</button>
          </div>
          <div class="right-add-Step">
            <button id="right-add-Step-Btn" data-parent="1" data-num="1">新增工序</button>

  <!-- 新增工艺弹窗 -->
  <div class="layer">
    <div class="add-craft">
      <div class="add-craft-header">
        <p>新增工艺</p>
      </div>
      <div class="add-craft-content">
        <input type="text" placeholder="请输入工艺名称">
        <p class="error">输入不能为空</p>
      </div>
      <div class="add-craft-footer">
        <button class="cancel-btn">取消</button>
        <button class="add-btn">新增</button>
      </div>
    </div>
  </div>

  <!-- 删除工艺弹窗 -->
  <div class="del-Craft-layer">
    <div class="del-craft">
      <div class="del-craft-header">
        <p>确定删除当前工艺吗？</p>
      </div>
      <div class="del-craft-footer">
        <button class="cancel-Craft-btn">取消</button>
        <button class="del-Craft-btn">确定</button>
      </div>
    </div>
  </div>

  <!-- 清空工序弹窗 -->
  <div class="clear-Step-layer">
    <div class="clear-Step">
      <div class="clear-Step-header">
        <p>确定清空当前工艺的工序吗？</p>
      </div>
      <div class="clear-Step-footer">
        <button class="cancel-Step-btn">取消</button>
        <button class="clear-Step-btn">确定</button>
      </div>
    </div>
  </div>

  <!-- 新增工序弹窗 -->
  <div class="add-Step-layer">
    <div class="add-Step">
      <div class="add-Step-header">
        <p>新增</p>
      </div>
      <div class="add-Step-content">
        <input type="text" placeholder="请输入工艺名称">
        <p class="error">输入不能为空</p>
      </div>
      <div class="add-Step-footer">
        <button class="cancel-Step-btn">取消</button>
        <button class="add-Step-btn">新增</button>
      </div>
    </div>
  </div>


  <!-- 删除特定工序弹框 -->
  <div class="del-Step-layer">
    <div class="del-Step">
      <div class="del-Step-header">
        <p>确定删除当前工艺的工序吗？</p>
      </div>
      <div class="del-Step-footer">
        <button class="cancel-Step-btn">取消</button>
        <button class="del-Step-btn">确定</button>
      </div>
    </div>
  </div>
