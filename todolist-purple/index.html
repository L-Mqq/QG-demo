<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purple-To do List</title>
  <link rel="stylesheet" href="./css/root.css">
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/index.css">
</head>

<body>
  <div class="w">
    <!-- logo模块 -->
    <div class="logo">
      <div class="logo-l"></div>
      <div class="logo-m"></div>
      <div class="logo-r"></div>
      <div class="img">
        <img src="./images/todo.svg" alt="">
      </div>
      <div class="clock">
        <div class="back"></div>
        <div class="cen"></div>
        <div class="front">
          <div class="round"></div>
        </div>
      </div>
    </div>

    <!-- 头部添加模块 -->
    <div class="add">
      <input type="text" class="list-put" placeholder="新增待办事项...">
      <button class="add-btn">添加</button>
    </div>
    <!-- 列表模块 -->
    <div class="list">
      <div class="list-top">
        <button class="finish--btn">全部标为完成</button>
        <span>今天就做完！( •̀ ω •́ )✧</span>
      </div>
      <div class="list-con">
        <ul>
          <!-- <li>
            <div class="fin-round">
              <div class="front">
                <img src="./images/finish.svg" alt="">
              </div>
              <div class="back"></div>
            </div>
            <div class="con">
              <span class="plan">睡觉睡觉睡觉</span>
            </div>
            <div class="del-btn">
              <div class="del-icon">
                <img src="./images/del.svg" alt="">
              </div>
              <div class="del-back"></div>
            </div>
          </li> -->
        </ul>
      </div>
      <div class="list-total">
        <span>剩余<i class="not-finish">1</i>项未完成</span>
      </div>

      <!-- 右侧模块 -->
      <div class="right">
        <button class="show">（￣︶￣）↗开　</button>
        <ul class="filter">
          <li class="all">全部</li>
          <li class="ongoing">进行中</li>
          <li class="finished">已完成</li>
          <li class="delete">回收站</li>
        </ul>
        <ul class="batch">
          <li class="finish--btn">全部标记为完成</li>
          <li class="clearFinished--btn">清除已完成</li>
          <li class="clearAll--btn">清除全部</li>
        </ul>
        <ul class="export">
          <li>导出数据</li>
          <li>导入(txt/json)</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- 弹框 -->
  <div class="alert">
    <div class="dialog">
      <div class="dialog-content">
        <h2>请确认</h2>
        <p class="msg">确认一键勾选完成全部待办事项？</p>
        <button class="dialog-btn confirm">确定</button>
        <button class="dialog-btn cancel">取消</button>
      </div>
    </div>
  </div>
  <script src="./js/index.js"></script>
</body>

</html>
